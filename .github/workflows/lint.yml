name: Code Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needs to submit dependency graph data
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    
    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@aade3bff5594fe8808578dd4db3dfeae9bf2abdc # v3.91.1
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'
  
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        version: "latest"

    - name: Install ruff
      run: uv tool install ruff

    - name: Submit uv dependency snapshot
      uses: rmuir/uv-dependency-submission@e021503b1390bff207cc96b4da354b1091607b9e # v1.0.0

    - name: Run ruff check
      run: uv tool run ruff check --output-format=github .

    - name: Run ruff format check
      run: uv tool run ruff format --check .

    - name: Run tests with coverage
      run: uv run python -m pytest --cov=src/lib --cov-report=term --cov-report=xml

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-report
        path: coverage.xml